<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مفاجأة لـ محمد ❤️</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Tajawal:wght@500;700&display=swap');

    body {
        font-family: 'Tajawal', sans-serif;
        background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
        margin: 0;
        overflow: hidden; 
        height: 100vh;
        user-select: none;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
    }

    .step {
        position: absolute;
        opacity: 0;
        visibility: hidden;
        transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), visibility 1.2s;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        width: 100%;
    }

    .step.active {
        opacity: 1;
        visibility: visible;
        z-index: 10;
    }

    .glass-card {
        background: rgba(255, 255, 255, 0.65);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 15px 35px rgba(31, 38, 135, 0.1);
        padding: 50px;
        width: 90%;
        max-width: 500px;
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
        z-index: 5; 
    }

    .polaroid-frame {
        background: #fff;
        padding: 12px 12px 40px 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        border-radius: 4px;
        margin-bottom: 30px;
        transform: rotate(-2deg);
        transition: transform 0.3s ease;
    }

    .polaroid-frame:hover {
        transform: rotate(0deg) scale(1.02);
    }

    .polaroid-frame img {
        width: 220px;
        height: 220px;
        object-fit: cover;
        border: 1px solid #eee;
    }

    h2 {
        color: #d63031;
        margin: 0 0 25px 0;
        font-size: 30px;
        font-weight: 700;
        line-height: 1.4;
    }

    button {
        background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
        color: white;
        border: none;
        padding: 16px 45px;
        font-size: 20px;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.4s ease;
        font-family: 'Tajawal', sans-serif;
        font-weight: 700;
        box-shadow: 0 6px 20px rgba(255, 107, 107, 0.3);
    }

    button:hover {
        transform: translateY(-4px) scale(1.03);
        box-shadow: 0 10px 25px rgba(255, 107, 107, 0.5);
    }

    .poem-container {
        font-size: 26px;
        color: #2D3436;
        line-height: 1.9;
        font-weight: 500;
        min-height: 300px;
        direction: rtl;
    }

    #next-final-btn {
        display: none;
        margin-top: 20px;
        animation: fadeInBtn 1s ease-in forwards;
    }

    @keyframes fadeInBtn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    /* تأثيرات البارتكل (الإيموجيات والصور) */
    .emoji-particle {
        position: absolute;
        font-size: 28px;
        pointer-events: none;
        animation: floatParticles 1.5s ease-out forwards;
        z-index: 9999;
        filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.15));
    }

    .img-particle {
        position: absolute;
        width: 45px;
        height: 45px;
        object-fit: cover;
        border-radius: 8px;
        border: 2px solid white;
        box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        pointer-events: none;
        animation: floatParticles 1.5s ease-out forwards;
        z-index: 9999;
    }

    /* هذا الأنيميشن يخليها تصعد ليفوك وتختفي (opacity: 0) بالنهاية */
    @keyframes floatParticles {
        0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 1; }
        50% { transform: translateY(-70px) scale(1.1) rotate(15deg); opacity: 1; }
        100% { transform: translateY(-140px) scale(0.9) rotate(-15deg); opacity: 0; }
    }

    #final-polaroid {
        transform: rotate(0deg); 
        margin-bottom: 20px;
        border-radius: 15px; 
        padding: 15px;
    }
    
    #final-polaroid img {
        border-radius: 10px;
    }

    .magic-date {
        font-size: 20px;
        color: #ff4757;
        margin-top: 15px;
        font-weight: 700;
        text-shadow: 0 2px 10px rgba(255, 71, 87, 0.4);
        letter-spacing: 1px;
        animation: pulse 2s infinite ease-in-out;
        direction: rtl;
    }

    @keyframes pulse {
        0% { transform: scale(1); opacity: 0.9; }
        50% { transform: scale(1.05); opacity: 1; }
        100% { transform: scale(1); opacity: 0.9; }
    }

</style>
</head>
<body>

<audio id="bg-music" src="https://a.top4top.io/m_3728y9it55.mp3" loop></audio>

<div class="step active" id="step1">
    <div class="glass-card">
        <div class="polaroid-frame">
            <img src="https://h.top4top.io/p_3728p4dfz0.jpg" alt="صورة 1">
        </div>
        <h2>أنتَ محمد؟ 🤔</h2>
        <button onclick="nextStep('step1', 'step2')">أي أني محمد! 😎</button>
    </div>
</div>

<div class="step" id="step2">
    <div class="glass-card">
        <div class="polaroid-frame">
            <img src="https://i.top4top.io/p_37281960x1.jpg" alt="صورة 2">
        </div>
        <h2>أريد أكلك شي بس مستحية 🫣</h2>
        <button onclick="nextStep('step2', 'step3')">يا الله شصاير! 😨</button>
    </div>
</div>

<div class="step" id="step3">
    <div class="glass-card">
        <div class="polaroid-frame">
            <img src="https://j.top4top.io/p_3728xkua32.jpg" alt="صورة 3">
        </div>
        <h2>تحب نور؟ ❤️</h2>
        <button onclick="nextStep('step3', 'step4')">شي أكيد أحبها! 😍</button>
    </div>
</div>

<div class="step" id="step4">
    <div class="glass-card">
        <div class="polaroid-frame">
            <img src="https://k.top4top.io/p_3728j9fw53.jpg" alt="صورة 4">
        </div>
        <h2>كول أحبج 😊</h2>
        <button onclick="nextStep('step4', 'step5')">أحبج ❤️🥰</button>
    </div>
</div>

<div class="step" id="step5">
    <div class="glass-card" style="max-width: 600px;">
        <div class="poem-container" id="poem-text"></div>
        <button id="next-final-btn" onclick="nextStep('step5', 'step6')">الله 😍</button>
    </div>
</div>

<div class="step" id="step6">
    <div class="glass-card">
        <div id="final-polaroid" class="polaroid-frame">
            <img src="https://l.top4top.io/p_3728mlnyk4.jpg" alt="الصورة النهائية" style="width: 240px; height: 240px;">
        </div>
        <h2 style="font-size: 38px; color: #ff7675; margin: 0;">أحبك ❤️</h2>
        <p class="magic-date">✨ بدونك جانت حياتي فاضية 2024/3/27 ✨</p>
    </div>
</div>

<script>
    const poem = "يَا مُحَمَّد، يَا سَنَدِي وَقُوَّتِي...\nأَنْتَ الرَّجُل الَّذِي بِهِ تَكْتَمِل قِصَّتِي...\nتَعَبَك رَاحَة لِي، وَرَاحَتُك هِيَ مُنْيَتِي...\nأَرَاك أَبًا لِأَطْفَالِي، وَقُدْوَة لِعَائِلَتِي...\nبِوُجُودِك، أَشْعُر بِالْأَمَان، وَتَزُول كُل حَيْرَتِي...\nاللَّه يُخَلِّيك لِي يَا كُل دُنْيَتِي ❤️";

    function nextStep(currentId, nextId) {
        document.getElementById(currentId).classList.remove('active');
        
        setTimeout(() => {
            document.getElementById(nextId).classList.add('active');
            
            if (nextId === 'step5') {
                startTyping();
            }
            
            if (nextId === 'step6') {
                document.getElementById('bg-music').play().catch(e => console.log("تحتاج تتفاعل ويا الصفحة لتشغيل الصوت"));
            }
        }, 1200); 
    }

    function startTyping() {
        const poemElement = document.getElementById('poem-text');
        poemElement.innerHTML = '';
        let i = 0;

        function typeWriter() {
            if (i < poem.length) {
                if (poem.charAt(i) === '\n') {
                    poemElement.innerHTML += '<br>';
                } else {
                    poemElement.innerHTML += poem.charAt(i);
                }
                i++;
                setTimeout(typeWriter, 55); 
            } else {
                document.getElementById('next-final-btn').style.display = 'inline-block';
            }
        }
        typeWriter();
    }

    // الإيموجيات والصور للبارتكلز
    const emojis = ['❤️', '🌹', '🍫', '💋', '🥰', '💖', '✨'];
    const catImages = [
        'https://a.top4top.io/p_3728g1mms0.jpg',
        'https://b.top4top.io/p_3728cdqoh1.jpg',
        'https://c.top4top.io/p_3728640222.jpg',
        'https://d.top4top.io/p_3728p4x7w3.jpg',
        'https://e.top4top.io/p_37285hu4g4.jpg'
    ];

    document.addEventListener('click', function(e) {
        // نطلع 3 بارتكلز بكل ضغطة (مختلطة بين صور البزازين والإيموجيات)
        for (let i = 0; i < 3; i++) {
            const isCat = Math.random() > 0.5; // نسبة 50% تطلع بزونة و50% يطلع إيموجي
            let particle;

            if (isCat) {
                particle = document.createElement('img');
                particle.src = catImages[Math.floor(Math.random() * catImages.length)];
                particle.className = 'img-particle';
            } else {
                particle = document.createElement('div');
                particle.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                particle.className = 'emoji-particle';
            }

            const randomX = (Math.random() - 0.5) * 80;
            const randomY = (Math.random() - 0.5) * 80;
            particle.style.left = (e.clientX + randomX - 15) + 'px';
            particle.style.top = (e.clientY + randomY - 15) + 'px';

            document.body.appendChild(particle);

            // بعد 1.5 ثانية (من يخلص الأنيميشن ويصير شفاف)، ينحذف تماماً من الشاشة
            setTimeout(() => {
                particle.remove();
            }, 1500);
        }
    });
</script>

</body>
</html>
